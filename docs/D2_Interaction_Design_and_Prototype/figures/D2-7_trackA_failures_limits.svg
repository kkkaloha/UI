<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" width="1200" height="680">
<style>
text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
.title { fill:#111827; font-size:20px; font-weight:600; }
.subtitle { fill:#6b7280; font-size:12px; }
.label { fill:#111827; font-size:13px; font-weight:600; }
.small { fill:#6b7280; font-size:11px; }
.tiny { fill:#6b7280; font-size:10px; }
.cell { fill:#111827; font-size:12px; }
</style>
<defs>
<marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2563eb"/></marker>
<marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#dc2626"/></marker>
<marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#16a34a"/></marker>
<marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#9333ea"/></marker>
</defs>
<rect width="1200" height="680" fill="#ffffff"/>
<text x="600" y="34" text-anchor="middle" class="title">Figure D2-7 — Track A Compliance Evidence in Report and Tab-3 Prototype</text>
<text x="600" y="56" text-anchor="middle" class="subtitle">Capability boundaries, user control, failure handling, and limitation communication are explicitly designed</text>
<rect x="70" y="100" width="490" height="220" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.8"/>
<text x="315" y="132" text-anchor="middle" class="label">1. Capability boundaries</text>
<rect x="105" y="147" width="420" height="28" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
<text x="125" y="165" text-anchor="start" class="small">Can: assess structure, clarity, STAR use</text>
<rect x="105" y="185" width="420" height="28" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
<text x="125" y="203" text-anchor="start" class="small">Can: generate JD/resume-based questions</text>
<rect x="105" y="223" width="420" height="28" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
<text x="125" y="241" text-anchor="start" class="small">Cannot: verify domain expertise or outcomes</text>
<rect x="105" y="261" width="420" height="28" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
<text x="125" y="279" text-anchor="start" class="small">Limited: voice analysis depends on audio quality</text>
<rect x="640" y="100" width="490" height="220" rx="12" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.8"/>
<text x="885" y="132" text-anchor="middle" class="label">2. User control</text>
<rect x="675" y="147" width="420" height="28" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
<text x="695" y="165" text-anchor="start" class="small">Flag inaccurate feedback</text>
<rect x="675" y="185" width="420" height="28" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
<text x="695" y="203" text-anchor="start" class="small">Override scores manually</text>
<rect x="675" y="223" width="420" height="28" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
<text x="695" y="241" text-anchor="start" class="small">Undo actions and discard evaluations</text>
<rect x="675" y="261" width="420" height="28" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
<text x="695" y="279" text-anchor="start" class="small">Confirm sensitive settings/actions</text>
<rect x="70" y="380" width="490" height="220" rx="12" fill="#fef2f2" stroke="#fecaca" stroke-width="1.8"/>
<text x="315" y="412" text-anchor="middle" class="label">3. Failure solutions</text>
<rect x="105" y="427" width="420" height="28" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
<text x="125" y="445" text-anchor="start" class="small">Voice failure → preserve partial text</text>
<rect x="105" y="465" width="420" height="28" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
<text x="125" y="483" text-anchor="start" class="small">AI generation error → retry or general bank</text>
<rect x="105" y="503" width="420" height="28" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
<text x="125" y="521" text-anchor="start" class="small">Extraction failure → manual Q&amp;A form</text>
<rect x="105" y="541" width="420" height="28" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
<text x="125" y="559" text-anchor="start" class="small">Invalid file → explain format and re-upload</text>
<rect x="640" y="380" width="490" height="220" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.8"/>
<text x="885" y="412" text-anchor="middle" class="label">4. Limitation communication</text>
<rect x="675" y="427" width="420" height="28" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
<text x="695" y="445" text-anchor="start" class="small">Confidence bars beside AI outputs</text>
<rect x="675" y="465" width="420" height="28" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
<text x="695" y="483" text-anchor="start" class="small">Low-confidence warning copy</text>
<rect x="675" y="503" width="420" height="28" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
<text x="695" y="521" text-anchor="start" class="small">Audio-quality warning in Review</text>
<rect x="675" y="541" width="420" height="28" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
<text x="695" y="559" text-anchor="start" class="small">Boundary banner before accepting scores</text>
<path d="M 560 210 C 600 210 600 210 640 210" stroke="#9333ea" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)"/>
<rect x="570" y="199" width="60" height="18" rx="4" fill="#ffffff" opacity="0.95"/>
<text x="600" y="212" text-anchor="middle" class="tiny">agency</text>
<path d="M 315 320 C 315 350 315 350 315 380" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrow-red)" stroke-dasharray="5 3"/>
<path d="M 885 320 C 885 350 885 350 885 380" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
<line x1="70" y1="650" x2="100" y2="650" stroke="#9333ea" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)"/>
<text x="110" y="654" text-anchor="start" class="tiny">Control link</text>
<line x1="245" y1="650" x2="275" y2="650" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrow-red)" stroke-dasharray="5 3"/>
<text x="285" y="654" text-anchor="start" class="tiny">Failure recovery</text>
<line x1="445" y1="650" x2="475" y2="650" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
<text x="485" y="654" text-anchor="start" class="tiny">Limitation signal</text>
</svg>