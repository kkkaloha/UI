<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760">
<style>
text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
.title { fill:#111827; font-size:20px; font-weight:600; }
.subtitle { fill:#6b7280; font-size:12px; }
.label { fill:#111827; font-size:13px; font-weight:600; }
.small { fill:#6b7280; font-size:11px; }
.tiny { fill:#6b7280; font-size:10px; }
.cell { fill:#111827; font-size:12px; }
</style>
<defs>
<marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2563eb"/></marker>
<marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#dc2626"/></marker>
<marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#16a34a"/></marker>
<marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#9333ea"/></marker>
</defs>
<rect width="1200" height="760" fill="#ffffff"/>
<text x="600" y="34" text-anchor="middle" class="title">Figure D2-5 — Review Workflow with Transcript Recovery</text>
<text x="600" y="56" text-anchor="middle" class="subtitle">End-to-end flow: recording upload → Q&amp;A extraction → editable transcript → review summary</text>
<rect x="520" y="85" width="180" height="48" rx="8" fill="#eff6ff" stroke="#d1d5db" stroke-width="1.5"/>
<text x="610" y="114" text-anchor="middle" class="label">Dashboard</text>
<rect x="520" y="160" width="180" height="48" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
<text x="610" y="189" text-anchor="middle" class="label">Upload recording</text>
<line x1="610" y1="133" x2="610" y2="160" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
<rect x="520" y="235" width="180" height="48" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
<text x="610" y="264" text-anchor="middle" class="label">Format + audio check</text>
<line x1="610" y1="208" x2="610" y2="235" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
<rect x="520" y="310" width="180" height="48" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
<text x="610" y="339" text-anchor="middle" class="label">Extract Q&amp;A</text>
<line x1="610" y1="283" x2="610" y2="310" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
<rect x="520" y="385" width="180" height="48" rx="8" fill="#eff6ff" stroke="#d1d5db" stroke-width="1.5"/>
<text x="610" y="414" text-anchor="middle" class="label">Edit transcript</text>
<line x1="610" y1="358" x2="610" y2="385" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
<rect x="520" y="460" width="180" height="48" rx="8" fill="#eff6ff" stroke="#d1d5db" stroke-width="1.5"/>
<text x="610" y="489" text-anchor="middle" class="label">AI review summary</text>
<line x1="610" y1="433" x2="610" y2="460" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
<rect x="520" y="535" width="180" height="48" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
<text x="610" y="564" text-anchor="middle" class="label">Save / Export</text>
<line x1="610" y1="508" x2="610" y2="535" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
<rect x="275" y="160" width="170" height="46" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
<text x="360" y="180" text-anchor="middle" class="small">Accepted types</text>
<text x="360" y="196" text-anchor="middle" class="tiny">mp3/mp4/wav</text>
<line x1="445" y1="183" x2="520" y2="183" stroke="#6b7280" stroke-width="1" fill="none" marker-end="url(#arrow-blue)" stroke-dasharray="4 2"/>
<rect x="275" y="235" width="170" height="46" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
<text x="360" y="255" text-anchor="middle" class="small">Progress bar</text>
<text x="360" y="271" text-anchor="middle" class="tiny">quality score</text>
<line x1="445" y1="258" x2="520" y2="258" stroke="#6b7280" stroke-width="1" fill="none" marker-end="url(#arrow-blue)" stroke-dasharray="4 2"/>
<rect x="275" y="385" width="170" height="46" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
<text x="360" y="405" text-anchor="middle" class="small">Editable Q&amp;A</text>
<text x="360" y="421" text-anchor="middle" class="tiny">user confirms</text>
<line x1="445" y1="408" x2="520" y2="408" stroke="#6b7280" stroke-width="1" fill="none" marker-end="url(#arrow-blue)" stroke-dasharray="4 2"/>
<rect x="275" y="460" width="170" height="46" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
<text x="360" y="480" text-anchor="middle" class="small">Confidence + gaps</text>
<text x="360" y="496" text-anchor="middle" class="tiny">shown with actions</text>
<line x1="445" y1="483" x2="520" y2="483" stroke="#6b7280" stroke-width="1" fill="none" marker-end="url(#arrow-blue)" stroke-dasharray="4 2"/>
<rect x="830" y="160" width="250" height="58" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5" stroke-dasharray="5 3"/>
<text x="955" y="180" text-anchor="middle" class="label">Invalid file</text>
<text x="955" y="198" text-anchor="middle" class="small">Reject with format message</text>
<text x="955" y="212" text-anchor="middle" class="tiny">Re-upload allowed</text>
<line x1="700" y1="189" x2="830" y2="189" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrow-red)" stroke-dasharray="5 3"/>
<rect x="830" y="235" width="250" height="58" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5" stroke-dasharray="5 3"/>
<text x="955" y="255" text-anchor="middle" class="label">Low audio quality</text>
<text x="955" y="273" text-anchor="middle" class="small">Warn before extraction</text>
<text x="955" y="287" text-anchor="middle" class="tiny">Require manual review</text>
<line x1="700" y1="264" x2="830" y2="264" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrow-red)" stroke-dasharray="5 3"/>
<rect x="830" y="310" width="250" height="58" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5" stroke-dasharray="5 3"/>
<text x="955" y="330" text-anchor="middle" class="label">Extraction fails</text>
<text x="955" y="348" text-anchor="middle" class="small">Create manual Q&amp;A form</text>
<text x="955" y="362" text-anchor="middle" class="tiny">No dead end</text>
<line x1="700" y1="339" x2="830" y2="339" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrow-red)" stroke-dasharray="5 3"/>
<rect x="830" y="460" width="250" height="58" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5" stroke-dasharray="5 3"/>
<text x="955" y="480" text-anchor="middle" class="label">Network / AI error</text>
<text x="955" y="498" text-anchor="middle" class="small">Retry summary generation</text>
<text x="955" y="512" text-anchor="middle" class="tiny">Keep edited transcript</text>
<line x1="700" y1="489" x2="830" y2="489" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrow-red)" stroke-dasharray="5 3"/>
<rect x="725" y="610" width="190" height="48" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
<text x="820" y="639" text-anchor="middle" class="label">Practice weak areas</text>
<path d="M 700 559 L 820 559 L 820 610" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
<rect x="415" y="610" width="190" height="48" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
<text x="510" y="639" text-anchor="middle" class="label">History detail</text>
<line x1="610" y1="583" x2="510" y2="610" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
<line x1="55" y1="715" x2="85" y2="715" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
<text x="95" y="719" text-anchor="start" class="tiny">Primary page jump</text>
<line x1="230" y1="715" x2="260" y2="715" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrow-red)" stroke-dasharray="5 3"/>
<text x="270" y="719" text-anchor="start" class="tiny">Exception recovery</text>
<line x1="425" y1="715" x2="455" y2="715" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
<text x="465" y="719" text-anchor="start" class="tiny">Output action</text>
</svg>