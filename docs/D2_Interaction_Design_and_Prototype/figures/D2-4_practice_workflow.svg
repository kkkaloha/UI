<rect x="830" y="220" width="250" height="58" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5" stroke-dasharray="5 3"/>
<text x="955" y="240" text-anchor="middle" class="label">Invalid resume</text>
<text x="955" y="258" text-anchor="middle" class="small">Show accepted formats</text>
<text x="955" y="272" text-anchor="middle" class="tiny">Replace file or skip</text>
<line x1="690" y1="249" x2="830" y2="249" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrow-red)" stroke-dasharray="5 3"/>
