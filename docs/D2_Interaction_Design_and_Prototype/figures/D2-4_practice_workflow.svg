<line x1="425" y1="815" x2="455" y2="815" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
<text x="465" y="819" text-anchor="start" class="tiny">Save / learning loop</text>
