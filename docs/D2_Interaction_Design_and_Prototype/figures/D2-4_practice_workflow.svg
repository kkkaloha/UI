<text x="955" y="328" text-anchor="middle" class="small">Retry or use general bank</text>
<text x="955" y="342" text-anchor="middle" class="tiny">Question list still opens</text>
<line x1="690" y1="319" x2="830" y2="319" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrow-red)" stroke-dasharray="5 3"/>
<rect x="830" y="430" width="250" height="58" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5" stroke-dasharray="5 3"/>
<text x="955" y="450" text-anchor="middle" class="label">Voice recognition fails</text>
<text x="955" y="468" text-anchor="middle" class="small">Preserve partial transcript</text>
<text x="955" y="482" text-anchor="middle" class="tiny">Switch to text input</text>
<line x1="690" y1="459" x2="830" y2="459" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrow-red)" stroke-dasharray="5 3"/>
<rect x="830" y="570" width="250" height="58" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5" stroke-dasharray="5 3"/>
<text x="955" y="590" text-anchor="middle" class="label">Low confidence</text>
<text x="955" y="608" text-anchor="middle" class="small">Boundary banner displayed</text>
<text x="955" y="622" text-anchor="middle" class="tiny">User verifies manually</text>
<line x1="690" y1="599" x2="830" y2="599" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrow-red)" stroke-dasharray="5 3"/>
<path d="M 690 663 L 820 663 L 820 735 L 690 735" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
<rect x="520" y="720" width="170" height="46" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
<text x="605" y="747" text-anchor="middle" class="label">History record</text>
<line x1="605" y1="686" x2="605" y2="720" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
<path d="M 520 663 L 410 663 L 410 383 L 520 383" stroke="#9333ea" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)"/>
