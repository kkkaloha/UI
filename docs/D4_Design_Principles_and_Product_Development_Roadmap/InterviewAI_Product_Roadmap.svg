<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
<title>InterviewAI Product Development Roadmap</title>
<defs><style>.f{font-family:Arial,Inter,sans-serif}.bg{fill:#0F172A}.t{fill:#F8FAFC;font-size:34px;font-weight:800}.sub{fill:#CBD5E1;font-size:15px}.card{fill:#1E293B;stroke-width:2}.h{fill:#F8FAFC;font-size:21px;font-weight:800}.h2{fill:#F8FAFC;font-size:16px;font-weight:700}.p{fill:#E2E8F0;font-size:13px}.b{fill:#F8FAFC;font-size:14px;font-weight:700}.sm{fill:#CBD5E1;font-size:13px}.lane{fill:#334155;stroke:#475569}.lanet{fill:#111827;stroke:#334155}.dot{fill:#fff;font-size:18px;font-weight:800}</style><marker id="arr" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10Z" fill="#94A3B8"/></marker></defs>
<rect width="1600" height="1000" class="bg"/>
<text x="800" y="66" text-anchor="middle" class="f t">InterviewAI Product Development Roadmap</text>
<text x="800" y="102" text-anchor="middle" class="f sub">Based on project files: high-fidelity HTML prototype, interaction design specification, evaluation findings, iteration records, and roadmap report</text>
<rect x="180" y="130" width="1240" height="64" rx="14" fill="#1E293B" stroke="#6C63FF"/>
<text x="800" y="154" text-anchor="middle" class="f b">Design Principles</text>
<text x="800" y="180" text-anchor="middle" class="f sub">Explainable AI · Recoverable Workflows · Layered Information · Continuous Improvement Loop</text>
<line x1="190" y1="256" x2="1410" y2="256" stroke="#94A3B8" stroke-width="3" marker-end="url(#arr)"/>
<text x="800" y="237" text-anchor="middle" class="f b" fill="#CBD5E1">From reliable MVP → personalised training → multi-modal adaptation → interview-readiness platform</text>
<circle cx="299" cy="256" r="20" fill="#6C63FF" stroke="#C4B5FD" stroke-width="2"/><text x="299" y="263" text-anchor="middle" class="f dot">1</text>
<circle cx="609" cy="256" r="20" fill="#3B82F6" stroke="#BFDBFE" stroke-width="2"/><text x="609" y="263" text-anchor="middle" class="f dot">2</text>
<circle cx="919" cy="256" r="20" fill="#10B981" stroke="#A7F3D0" stroke-width="2"/><text x="919" y="263" text-anchor="middle" class="f dot">3</text>
<circle cx="1229" cy="256" r="20" fill="#F59E0B" stroke="#FDE68A" stroke-width="2"/><text x="1229" y="263" text-anchor="middle" class="f dot">4</text>
<rect x="160" y="310" width="280" height="380" rx="14" class="card" stroke="#6C63FF"/><text x="184" y="346" class="f h">Stage 1</text><text x="184" y="374" class="f h2">Core Workflow Stabilisation</text><text x="184" y="408" class="f p">Goal: turn the prototype into a reliable MVP.</text><text x="184" y="444" class="f p">Priorities:</text><text x="184" y="470" class="f p">• Editable JD and resume context</text><text x="184" y="494" class="f p">• Draft saving, auto-save, leave warnings</text><text x="184" y="518" class="f p">• Practice progress and status feedback</text><text x="184" y="542" class="f p">• Lower cognitive load on Answer page</text><text x="184" y="566" class="f p">• Review audio warnings and recovery</text><text x="184" y="590" class="f p">• Consistent CTAs, cards, confidence cues</text><text x="184" y="635" class="f p">Result: complete Practice and Review with</text><text x="184" y="659" class="f p">less data loss and clearer next steps.</text>
<rect x="470" y="310" width="280" height="380" rx="14" class="card" stroke="#3B82F6"/><text x="494" y="346" class="f h">Stage 2</text><text x="494" y="374" class="f h2">Personalised Coaching</text><text x="494" y="408" class="f p">Goal: move from isolated feedback to training.</text><text x="494" y="444" class="f p">Priorities:</text><text x="494" y="470" class="f p">• Deeper JD, resume, role and focus use</text><text x="494" y="494" class="f p">• Identify recurring weak areas</text><text x="494" y="518" class="f p">• Recommend next drills and training plans</text><text x="494" y="542" class="f p">• Coach STAR, impact, teamwork, role fit</text><text x="494" y="566" class="f p">  and technical trade-offs</text><text x="494" y="590" class="f p">• Session comparison and weakness trends</text><text x="494" y="635" class="f p">Result: know what is weak, what to practise</text><text x="494" y="659" class="f p">next, and why.</text>
<rect x="780" y="310" width="280" height="380" rx="14" class="card" stroke="#10B981"/><text x="804" y="346" class="f h">Stage 3</text><text x="804" y="374" class="f h2">Multi-Modal / Multi-Device</text><text x="804" y="408" class="f p">Goal: support devices and input modalities.</text><text x="804" y="444" class="f p">Priorities:</text><text x="804" y="470" class="f p">• Mobile summary and reflection cards</text><text x="804" y="494" class="f p">• Tablet light practice, desktop deep editing</text><text x="804" y="518" class="f p">• Recording recovery and live transcription</text><text x="804" y="542" class="f p">• Audio quality and confidence cues</text><text x="804" y="566" class="f p">• Mixed voice / text answers and editing</text><text x="804" y="590" class="f p">• Files, job links, and quick notes</text><text x="804" y="635" class="f p">Result: desktop deep practice, mobile review,</text><text x="804" y="659" class="f p">and voice-supported rehearsal.</text>
<rect x="1090" y="310" width="280" height="380" rx="14" class="card" stroke="#F59E0B"/><text x="1114" y="346" class="f h">Stage 4</text><text x="1114" y="374" class="f h2">Simulation and Ecosystem</text><text x="1114" y="408" class="f p">Goal: become an interview-readiness platform.</text><text x="1114" y="444" class="f p">Priorities:</text><text x="1114" y="470" class="f p">• Dynamic mock interviews and follow-ups</text><text x="1114" y="494" class="f p">• Interviewer styles and pressure simulation</text><text x="1114" y="518" class="f p">• Prep plans and role/company bundles</text><text x="1114" y="542" class="f p">• Export summaries, peer / mentor review</text><text x="1114" y="566" class="f p">• Reminders, scheduling, planning integration</text><text x="1114" y="590" class="f p">• Trends, weak clusters, capability growth</text><text x="1114" y="635" class="f p">Result: solo practice, realistic simulation,</text><text x="1114" y="659" class="f p">collaboration, and long-term growth.</text>
<rect x="160" y="730" width="150" height="44" rx="10" class="lane"/><text x="235" y="758" text-anchor="middle" class="f b">Scenario Expansion</text><rect x="330" y="730" width="1040" height="44" rx="10" class="lanet"/><text x="352" y="758" class="f sm">Click-through demo → repeatable workflow → structured training sets and weak-area drills → mobile review and voice practice → simulation and collaboration</text>
<rect x="160" y="790" width="150" height="44" rx="10" class="lane"/><text x="235" y="818" text-anchor="middle" class="f b">User Expansion</text><rect x="330" y="790" width="1040" height="44" rx="10" class="lanet"/><text x="352" y="818" class="f sm">Fresh graduates and early-career candidates → career switchers, 1–3 year candidates, speaking-practice users → mobile / voice users → mentors and institutions</text>
<rect x="160" y="850" width="150" height="44" rx="10" class="lane"/><text x="235" y="878" text-anchor="middle" class="f b">Interaction Expansion</text><rect x="330" y="850" width="1040" height="44" rx="10" class="lanet"/><text x="352" y="878" class="f sm">Laptop-first refinement and keyboard support → recommendation flows and training plans → responsive UI, mobile cards, drawers, voice controls → shared review and integrations</text>
<rect x="250" y="925" width="1100" height="48" rx="14" fill="#4C1D95" stroke="#A78BFA"/><text x="800" y="955" text-anchor="middle" class="f b">Core learning loop: understand role → generate tailored questions → construct answer → explain feedback → track weaknesses → compare progress → recommend next practice</text>
</svg>